<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Forms challenge</title>
</head>
<body>
    <header>
        <h1>Contact Us</h1>
    </header>
    <main>
        <form action="/challenge-page" method="GET">
            <section>
                <h2>How can we help you?</h2>
                <ul>
                    <li>
                        <label for="name">Your Name</label>
                        <input type="text" id="name" name="name" required>
                    </li>
                    <li>
                        <label for="email">Your Email</label>
                        <input type="email" id="email" name="email" required>
                    </li>
                    <li>
                        <label for="mobile">Your Phone Number</label>
                        <input type="tel" id="mobile" name="mobile" required minlength="10" maxlength="10">
                    </li>
                    <li>
                        <label for="message">Your message</label>
                        <textarea name="message" id="message" required minlength="2" maxlength="250" rows="7"></textarea>
                    </li>
                </ul>
            </section>

            <section>
                <label for="channel">How did you find us?</label>
                <select name="channel" id="channel" required>
                    <option value="search">Web search</option>
                    <option value="word-of-mouth">Word of mouth</option>
                    <option value="other">Other</option>
                </select>
            </section>

            <section>
                <h2>How should we reply?</h2>
                <ul>
                    <li class="inline-control">
                        <input type="radio" name="reply" id="reply-phone" value="phone" required>
                        <label for="reply-phone">Call me</label>
                    </li>
                    <li class="inline-control">
                        <input type="radio" name="reply" id="reply-email" value="email" required>
                        <label for="reply-email">Email me</label>
                    </li>
                    <li class="inline-control">
                        <input type="radio" name="reply" id="reply-none" value="none" required>
                        <label for="reply-none">Do not reply</label>
                    </li>
                </ul>
            </section>

            <section class="inline-control">
                <input type="checkbox" name="terms" id="terms" required>
                <label for="terms">Accept Terms</label>
            </section>

            <section id="form-actions">
                <button type="reset" class="btn-empty">Clear form</button>
                <button type="submit" class="btn-filled">Request</button>
            </section>
        </form>
    </main>
</body>
</html>
