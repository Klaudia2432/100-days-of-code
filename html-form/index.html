<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>HTML Forms</title>
</head>
<body>
    
    <header>
        <h1>Registration form</h1>
    </header>
    
    <main>
        <form action="/" method="GET">
            
            <section>
                <h2>Your personal details</h2>
                <ul>
                    <li>
                        <label for="user-name">Username</label>
                        <input type="text" name="user-name" id="user-name" required/>
                    </li>
                    <li>
                        <label for="email">Email</label>
                        <input type="email" name="email" id="email" required>
                    </li>
                    <li>
                        <label for="password">Password</label>
                        <input type="password" minlength="8" name="password" id="password" required>
                    </li>
                </ul>
            </section>

            <section>
                <h2>More details</h2>
                <ul>
                    <li>
                        <label for="age">Age</label>
                        <input type="number" step="0.5" name="age" id="age">
                    </li>
                    <li>
                        <label for="birth-date">Birth date</label>
                        <input type="date" id="birth-date" name="date" required minlength="1920-01-01" maxlength="2006-01-01">
                    </li>
                    <li>
                        <label for="content-info">What content information would you see most</label>
                        <select name="content" id="content-info">
                            <option value="none"> </option>
                            <option value="testing">Software Testing</option>
                            <option value="development">Software Development</option>
                            <option value="general">General tech news</option>
                        </select>
                    </li>
                </ul>
            </section>

            <section>
                <label for="message">Message</label>
                <textarea name="message" id="message"></textarea>
            </section>

            <section>
                <h2>How should we verify your account?</h2>
                <ul>
                    <li class="form-control-radio-btn">
                        <input type="radio" id="verify-call" name="verify" value="phone-call">
                        <label for="verify-call">Phone call</label>
                    </li>
                    <li class="form-control-radio-btn">
                        <input type="radio" id="verify-call" name="verify" value="phone-call">
                        <label for="verify-call">Phone call</label>
                    </li>
                    <li class="form-control-radio-btn">
                        <input type="radio" id="verify-sms" name="verify" value="text-message">
                        <label for="verify-sms">SMS with authentication code</label>
                    </li>
                    <li class="form-control-radio-btn">
                        <input type="radio" id="verify-email" name="verify" value="email">
                        <label for="verify-email">Email</label>
                    </li>
                </ul>
            </section>

            <section>
                <h2>How should we contact you?</h2>
                <ul>
                    <li class="form-control-radio-btn">
                        <input type="checkbox" name="contact" id="contact-email" value="email">
                        <label for="contact-email">Contact me via email</label>
                    </li>
                    <li class="form-control-radio-btn">
                        <input type="checkbox" name="contact" id="contact-phone" value="phone">
                        <label for="contact-phone">Contact me via phone</label>
                    </li>
                </ul>
            </section>

            <section>
                <div class="form-control-radio-btn">
                    <input type="checkbox" name="terms" id="agree-terms">
                    <label for="agree-terms">I agree to the page Terms and Conditions</label>
                </div>
            </section>

            <section>
                <button type="submit">Submit</button>
            </section>
        </form>
    </main>
</body>
</html>
